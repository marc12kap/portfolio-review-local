name: Release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run check

      - name: Build ZIP
        run: npm run release:zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-review-local-release
          path: release/*.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.zip --generate-notes --title "$GITHUB_REF_NAME"
